<!DOCTYPE html>
<html lang="en">
<head>
  <title>L.W.K.</title>
  <meta name="keywords" content="writing, skrive, selvutvikling, vekst, personlig, blog, blogg, design, graphic, designer, grafisk, visuell, kommunikasjon, communicator, visual, lisa, wigum, kjærås">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon2.svg">
</head>

<body>
  <main>
    <div class="grid">
      <div class="logo-container">
        <div class="logo">
          <span id="logo-text"></span><span id="cursor" class="cursor blinking">|</span>
        </div>
        <div class="info">&nbsp;</div>  
      </div>                     

      <div class="menu">
        <li><a href="mailto:lisawigum@gmail.com" class="email-button">mail (og sms) er helt ok</a></li>
      </div>
    </div>

    <section class="diary-section">
      <article class="diary-entry">
        <h3>3. oktober, 2025</h3>
        <p>Hallo, internett!! Det er meg. Lisa.</p>
      </article>
    </section>
  </main>  

<script>
window.addEventListener('DOMContentLoaded', () => {
  const logo = document.getElementById('logo-text');
  const cursor = document.getElementById('cursor');

  // 1: skriv "Lisaw" raskt
  const fastText = "Lisaw";
  let i = 0;

  const typeFast = () => {
    if (i < fastText.length) {
      logo.textContent += fastText[i];
      i++;
      setTimeout(typeFast, 60);
    } else {
      setTimeout(deleteW, 250);
    }
  };

  // 2: slett "w"
  const deleteW = () => {
    logo.textContent = logo.textContent.slice(0, -1);
    setTimeout(addSpace, 160);
  };

  // 3: mellomrom
  const addSpace = () => {
    logo.textContent += " ";
    setTimeout(typeRest, 180);
  };

  // 4: resten
  const restText = "wigum kjærås";
  let j = 0;

  const typeRest = () => {
    if (j < restText.length) {
      logo.textContent += restText[j];

      let delay = 85;
      if (restText[j] === " ") delay += 120;

      j++;
      setTimeout(typeRest, delay);
    } else {
      finishCursor();
    }
  };

  // ✨ NY: ekte "Word-style" avslutning
  const finishCursor = () => {
    // liten pause så det føles ferdig
    setTimeout(() => {
      // vent til cursoren er i "av"-fase av blink
      setTimeout(() => {
        cursor.style.display = "none";
      }, 400); // halv blink-syklus (matcher CSS)
    }, 250);
  };

  // start
  setTimeout(typeFast, 300);
});
</script>

</body>
</html>
